version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-n8n}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-n8n}
      POSTGRES_DB: ${DB_NAME:-n8n}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: n8n-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n-network
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest-alpine
    container_name: n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Core Settings
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-n8n}
      
      # Redis Cache
      REDIS_HEALTH_INTERVAL_MS: 30
      GENERIC_TIMEZONE: ${TIMEZONE:-UTC}
      
      # Security
      N8N_SECURE_COOKIE: "true"
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-changeme}
      
      # Domain Configuration
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_RELOAD_DB_ON_START: "${N8N_RELOAD_DB_ON_START:-false}"
      
      # Webhook Configuration
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678}
      WEBHOOKS_ENABLED: "true"
      WEBHOOKS_SKIP_VERIFICATION: ${WEBHOOKS_SKIP_VERIFICATION:-false}
      
      # Enterprise Settings (if applicable)
      N8N_TEMPLATES_ENABLED: "true"
      N8N_COMMUNITY_NODES_ENABLED: "true"
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_OUTPUT: combined
      
      # Performance
      EXECUTIONS_TIMEOUT: 3600
      EXECUTIONS_TIMEOUT_MAX: 7200
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: n8n-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - n8n
    networks:
      - n8n-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  n8n_data:
    driver: local

networks:
  n8n-network:
    driver: bridge
