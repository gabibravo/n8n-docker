name: 🚀 Deploy to Digital Ocean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@master
        with:
          # Configurar en GitHub Secrets:
          # - DROPLET_HOST: IP de tu Droplet
          # - DROPLET_USERNAME: usuario (root o tu usuario)
          # - DROPLET_SSH_KEY: tu clave SSH privada
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          script: |
            cd /root/n8n-docker || cd ~/n8n-docker
            
            echo "📥 Pulling latest code..."
            git pull origin main
            
            echo "📦 Pulling Docker images..."
            docker-compose pull
            
            echo "🚀 Starting services..."
            docker-compose up -d
            
            echo "⏳ Waiting for health check..."
            sleep 10
            
            echo "🔍 Verifying deployment..."
            docker-compose exec -T n8n wget --quiet --tries=1 --spider http://localhost:5678/healthz && echo "✅ Deployment successful!" || echo "⚠️  Health check failed - check logs"
            
            echo "📊 Service status:"
            docker-compose ps

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Send Slack notification
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "⚠️  n8n deployment failed!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Failed*\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Send successful notification
        if: success()
        run: echo "✅ Deployment successful!"

